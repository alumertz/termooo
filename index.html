<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=0" />
  <title>term.ooo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-side">
        <button class="icon-btn" id="btn-archive" aria-label="Arquivo">
          <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <button class="icon-btn" id="btn-help" aria-label="Ajuda">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor" stroke="none"/></svg>
        </button>
      </div>
      <div class="header-title">TERMO<span class="header-subtitle">by Ana to Milo</span></div>
      <div class="header-side header-right">
        <button class="icon-btn" id="btn-stats" aria-label="Estatísticas">
          <svg viewBox="0 0 24 24"><line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="10"/></svg>
        </button>
        <button class="icon-btn" id="btn-settings" aria-label="Sobre">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div id="calendar-panel" class="hidden">
    <div class="calendar">
      <div class="calendar-nav">
        <button class="icon-btn" id="cal-prev" aria-label="Mês anterior">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span id="cal-month-label"></span>
        <button class="icon-btn" id="cal-next" aria-label="Próximo mês">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="calendar-weekdays">
        <span>dom</span><span>seg</span><span>ter</span><span>qua</span>
        <span>qui</span><span>sex</span><span>sáb</span>
      </div>
      <div id="cal-grid"></div>
    </div>
  </div>

  <div id="toast-wrap">
    <div id="toast"></div>
  </div>

  <main>
    <div id="board"></div>
  </main>

  <div id="keyboard"></div>

  <div id="about-overlay" class="hidden">
    <div class="modal modal--about">
      <div class="about-content">
        <p>Termo by Ana é baseado no <a href="https://term.ooo" target="_blank" rel="noopener">Termo</a> que é baseado no <a href="https://www.nytimes.com/games/wordle/index.html" target="_blank" rel="noopener">Wordle</a></p>
        <p class="about-love">Feito com todo amor e carinho por <a href="https://github.com/alumertz" target="_blank" rel="noopener">Ana</a> pra <a href="https://github.com/camilomunhoz" target="_blank" rel="noopener">Camilo</a></p>
        <p class="about-emoji">🎂🎉🥳</p>
      </div>
    </div>
  </div>

  <div id="overlay" class="hidden">
    <div class="modal">
      <div id="modal-word"></div>
      <div id="modal-sentence"></div>

      <div class="stats-section">
        <h2 class="stats-title">progresso</h2>
        <div class="stats-grid">
          <div class="stat">
            <span class="stat-num" id="stat-games">0</span>
            <span class="stat-label">jogos</span>
          </div>
          <div class="stat">
            <span class="stat-num" id="stat-pct">0%</span>
            <span class="stat-label">de vitórias</span>
          </div>
          <div class="stat">
            <span class="stat-num" id="stat-streak">0</span>
            <span class="stat-label">sequência<br>de vitórias</span>
          </div>
          <div class="stat">
            <span class="stat-num" id="stat-best">0</span>
            <span class="stat-label">melhor<br>sequência</span>
          </div>
        </div>

        <div class="dist-header">
          <h2 class="stats-title">distribuição de tentativas</h2>
        </div>
        <div id="dist-chart"></div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
